name: Get commit message

on:
  workflow_dispatch:

jobs:
  Get-Commit-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print-commit-message
        run: |
          # Fetches the subject line of the last commit
          # COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          # echo $COMMIT_MSG
          python toto.py --commit=$COMMIT_MSG